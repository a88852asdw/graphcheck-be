name: Build and deploy Python app to Azure Web App

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      # 使用 3 个 ID 进行免密身份验证
      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: '18b8dac7-402c-4ce2-95f3-310f0e31abe3'
          tenant-id: '6700e121-fc69-448d-89fc-230dca6c2c25'
          subscription-id: '3bd3d7d9-a57d-4fbe-86e5-eb04bbd6bbbe'

      # 正式部署到 Web App
      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v3
        with:
          app-name: 'graphcheck-webapp'
